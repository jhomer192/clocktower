<!doctype html>
<html lang="en" data-theme="tokyo-night">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/clocktower/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Clocktower ST</title>
    <script>
      // FOUC prevention: apply saved theme before first paint
      (function() {
        var t = localStorage.getItem('clocktower-theme') || 'tokyo-night';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
